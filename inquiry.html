<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>お問い合わせ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>お問い合わせ</h2>

  <p>種別</p>
  <label><input type="radio" name="category" value="general"> 質問全般</label><br>
  <label><input type="radio" name="category" value="event"> イベント関連</label><br>
  <label><input type="radio" name="category" value="bug"> アプリ不具合</label><br>
  <label><input type="radio" name="category" value="other"> その他</label><br>

  <p>内容</p>
  <textarea id="message" rows="5" style="width:100%"></textarea>

  <br><br>
  <button onclick="submitForm()">送信</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmzAsVHLQAGQbHO9hZwQE49PJZOTUJgk4",
  authDomain: "wakahiga-test.firebaseapp.com",
  projectId: "wakahiga-test",
  storageBucket: "wakahiga-test.firebasestorage.app",
  messagingSenderId: "369904902476",
  appId: "1:369904902476:web:3660b07939c9fe2347afe9"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let userId = "";

    async function init() {
      await liff.init({ liffId: "あなたのLIFF ID" });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      userId = profile.userId;
    }

    window.submitForm = async function () {
      const category = document.querySelector('input[name="category"]:checked');
      const message = document.getElementById("message").value;

      if (!category || !message) {
        alert("すべて入力してください");
        return;
      }

      await addDoc(collection(db, "inquiries"), {
        userId: userId,
        category: category.value,
        message: message,
        createdAt: new Date().toISOString()
      });

      alert("送信しました");
      liff.closeWindow();
    };

    init();
  </script>
</body>
</html>
