<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>閲覧履歴</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
    }

    h2 {
      margin-bottom: 8px;
    }

    .info, .success, .error {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .info {
      background: #f4f4f4;
    }

    .success {
      background: #e8f5e9;
      border: 1px solid #06c755;
    }

    .error {
      background: #fdecea;
      border: 1px solid #d93025;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      font-size: 16px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      background: #4a90e2;
      color: white;
    }

    .summary {
      background: #f4f4f4;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
    }

    .summary-card {
      background: #f4f4f4;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .chart-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      margin-bottom: 20px;
      background: #f4f4f4;
      border-radius: 8px;
      padding: 16px;
    }

    .chart-legend {
      width: 100%;
      max-width: 320px;
      font-size: 14px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .meta {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
    }

    pre {
      background: #f4f4f4;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>閲覧履歴</h2>

  <div class="info">
    <div><strong>状態:</strong> <span id="status">初期化前</span></div>
    <div><strong>userId:</strong> <span id="userId">Loading...</span></div>
    <div><strong>氏名:</strong> <span id="displayName">取得中...</span></div>
    <div><strong>role:</strong> <span id="myRole">取得中...</span></div>
  </div>

  <div id="accessMessage"></div>

  <div id="mainArea" style="display:none;">
    <label for="viewMode">表示モード</label>
    <select id="viewMode">
      <option value="list">一覧</option>
      <option value="summary">集計</option>
    </select>

    <label for="limitCount">表示件数</label>
    <select id="limitCount">
      <option value="20">20件</option>
      <option value="50">50件</option>
      <option value="100">100件</option>
      <option value="all">すべて</option>
    </select>

    <label for="searchText">検索（氏名・回覧物名）</label>
    <input type="text" id="searchText" placeholder="例: 山田 / 回覧板_20260401" />

    <button id="backBtn">戻る</button>

    <div class="summary">
      <div><strong>総アクセス数:</strong> <span id="totalCount">0</span></div>
      <div><strong>ユニークユーザー数:</strong> <span id="uniqueUserCount">0</span></div>
      <div><strong>表示件数:</strong> <span id="filteredCount">0</span></div>
    </div>

    <div id="listArea">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>氏名</th>
              <th>回覧物</th>
              <th>閲覧日時</th>
            </tr>
          </thead>
          <tbody id="logTableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="summaryArea" class="hidden">
      <div id="chartContainer"></div>
      <div id="summaryList"></div>
    </div>
  </div>

  <h3>デバッグ</h3>
  <pre id="output"></pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      getDocs,
      collection
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCmzAsVHLQAGQbHO9hZwQE49PJZOTUJgk4",
      authDomain: "wakahiga-test.firebaseapp.com",
      projectId: "wakahiga-test",
      storageBucket: "wakahiga-test.firebasestorage.app",
      messagingSenderId: "369904902476",
      appId: "1:369904902476:web:3660b07939c9fe2347afe9"
    };

    // admin 用 LIFF ID を入れてください
    const LIFF_ID = "2009656225-wPkU5qyM";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const statusEl = document.getElementById("status");
    const userIdEl = document.getElementById("userId");
    const displayNameEl = document.getElementById("displayName");
    const myRoleEl = document.getElementById("myRole");
    const accessMessageEl = document.getElementById("accessMessage");
    const mainAreaEl = document.getElementById("mainArea");
    const outputEl = document.getElementById("output");

    const searchTextEl = document.getElementById("searchText");
    const viewModeEl = document.getElementById("viewMode");
    const limitCountEl = document.getElementById("limitCount");

    const totalCountEl = document.getElementById("totalCount");
    const uniqueUserCountEl = document.getElementById("uniqueUserCount");
    const filteredCountEl = document.getElementById("filteredCount");

    const listAreaEl = document.getElementById("listArea");
    const summaryAreaEl = document.getElementById("summaryArea");
    const logTableBodyEl = document.getElementById("logTableBody");
    const chartContainerEl = document.getElementById("chartContainer");
    const summaryListEl = document.getElementById("summaryList");

    let currentUserId = "";
    let currentUserData = null;
    let allLogs = [];
    let allUsers = [];

    function setStatus(text) {
      statusEl.textContent = text;
      outputEl.textContent += `[STATUS] ${text}\n`;
    }

    function showAccessMessage(type, text) {
      accessMessageEl.className = type;
      accessMessageEl.textContent = text;
    }

    function formatDate(isoString) {
      if (!isoString) return "日時不明";
      try {
        return new Date(isoString).toLocaleString("ja-JP");
      } catch {
        return isoString;
      }
    }

    async function initLiff() {
      try {
        setStatus("LIFF初期化開始");
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setStatus("未ログインのためloginへ");
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentUserId = profile.userId;
        userIdEl.textContent = currentUserId;
        setStatus("userId取得完了");

        await checkAccess();
      } catch (e) {
        setStatus("LIFFエラー");
        outputEl.textContent += `[LIFF ERROR] ${e.message || e}\n`;
        showAccessMessage("error", "初期化に失敗しました。");
      }
    }

    async function checkAccess() {
      try {
        const refUser = doc(db, "users", currentUserId);
        const snapUser = await getDoc(refUser);

        if (!snapUser.exists()) {
          displayNameEl.textContent = "未登録";
          myRoleEl.textContent = "user";
          showAccessMessage("error", "登録情報が見つかりません。");
          return;
        }

        currentUserData = snapUser.data();
        const myRole = currentUserData.role || "user";
        const fullName = `${currentUserData.lastName || ""} ${currentUserData.firstName || ""}`.trim();

        displayNameEl.textContent = fullName || "氏名未設定";
        myRoleEl.textContent = myRole;

        if (myRole !== "admin" && myRole !== "master") {
          showAccessMessage("error", "管理者権限がありません。");
          setStatus("権限なし");
          return;
        }

        showAccessMessage("success", `${myRole} でログイン中です。`);
        mainAreaEl.style.display = "block";
        setStatus("アクセス許可");

        await loadData();
      } catch (e) {
        setStatus("権限確認エラー");
        outputEl.textContent += `[ACCESS ERROR] ${e.message || e}\n`;
        showAccessMessage("error", "権限確認に失敗しました。");
      }
    }

    async function loadData() {
      try {
        setStatus("データ取得中");

        const [logSnap, userSnap] = await Promise.all([
          getDocs(collection(db, "viewLogs")),
          getDocs(collection(db, "users"))
        ]);

        allLogs = [];
        logSnap.forEach(docSnap => {
          allLogs.push({
            docId: docSnap.id,
            ...docSnap.data()
          });
        });

        allLogs.sort((a, b) => {
          const aDate = a.viewedAt || "";
          const bDate = b.viewedAt || "";
          return bDate.localeCompare(aDate);
        });

        allUsers = [];
        userSnap.forEach(docSnap => {
          allUsers.push({
            docId: docSnap.id,
            ...docSnap.data()
          });
        });

        renderAll();
        setStatus("データ取得完了");
      } catch (e) {
        setStatus("データ取得エラー");
        outputEl.textContent += `[LOAD DATA ERROR] ${e.message || e}\n`;
      }
    }

    function getFilteredLogs() {
      const search = searchTextEl.value.trim().toLowerCase();
      const limitValue = limitCountEl.value;

      let filtered = allLogs.filter(item => {
        const target = `${item.lastName || ""} ${item.firstName || ""} ${item.documentName || ""}`.toLowerCase();
        return !search || target.includes(search);
      });

      if (limitValue !== "all") {
        filtered = filtered.slice(0, Number(limitValue));
      }

      return filtered;
    }

    function renderAll() {
      const filtered = getFilteredLogs();
      const uniqueUsers = new Set(allLogs.map(item => item.userId).filter(Boolean));

      totalCountEl.textContent = allLogs.length;
      uniqueUserCountEl.textContent = uniqueUsers.size;
      filteredCountEl.textContent = filtered.length;

      if (viewModeEl.value === "list") {
        listAreaEl.classList.remove("hidden");
        summaryAreaEl.classList.add("hidden");
        renderTable(filtered);
      } else {
        listAreaEl.classList.add("hidden");
        summaryAreaEl.classList.remove("hidden");
        renderSummary(filtered);
      }
    }

    function renderTable(logs) {
      if (logs.length === 0) {
        logTableBodyEl.innerHTML = "<tr><td colspan='3'>該当する閲覧履歴はありません。</td></tr>";
        return;
      }

      logTableBodyEl.innerHTML = logs.map(item => {
        const name = `${item.lastName || ""} ${item.firstName || ""}`.trim() || "氏名未設定";
        return `
          <tr>
            <td>${escapeHtml(name)}</td>
            <td>${escapeHtml(item.documentName || "未設定")}</td>
            <td>${escapeHtml(formatDate(item.viewedAt))}</td>
          </tr>
        `;
      }).join("");
    }

    function renderSummary(logs) {
      chartContainerEl.innerHTML = "";
      summaryListEl.innerHTML = "";

      if (logs.length === 0) {
        summaryListEl.innerHTML = "<div class='summary-card'>集計対象の閲覧履歴はありません。</div>";
        return;
      }

      // 最新回覧板名を documentName の降順末尾で判定
      const docNames = [...new Set(logs.map(item => item.documentName).filter(Boolean))].sort();
      const latestDocumentName = docNames.length ? docNames[docNames.length - 1] : null;

      if (!latestDocumentName) {
        summaryListEl.innerHTML = "<div class='summary-card'>回覧板名が見つかりません。</div>";
        return;
      }

      const latestLogs = allLogs.filter(item => item.documentName === latestDocumentName);
      const viewedUserIds = new Set(latestLogs.map(item => item.userId).filter(Boolean));

      const totalRegistered = allUsers.length;
      const viewedCount = viewedUserIds.size;
      const notViewedCount = Math.max(totalRegistered - viewedCount, 0);

      renderPieChart(latestDocumentName, viewedCount, notViewedCount, totalRegistered);

      summaryListEl.innerHTML = `
        <div class="summary-card">
          <strong>${escapeHtml(latestDocumentName)}</strong><br>
          閲覧済: ${viewedCount} 人<br>
          未閲覧: ${notViewedCount} 人<br>
          登録者数: ${totalRegistered} 人
        </div>
      `;
    }

    function renderPieChart(documentName, viewedCount, notViewedCount, totalRegistered) {
      const wrapper = document.createElement("div");
      wrapper.className = "chart-wrap";

      const title = document.createElement("div");
      title.innerHTML = `<strong>最新回覧板の閲覧状況</strong><br>${escapeHtml(documentName)}`;

      const canvas = document.createElement("canvas");
      canvas.width = 220;
      canvas.height = 220;

      const chartText = document.createElement("div");
      chartText.innerHTML = `<strong>閲覧済 ${viewedCount} / 登録者数 ${totalRegistered}</strong>`;

      const legend = document.createElement("div");
      legend.className = "chart-legend";
      legend.innerHTML = `
        <div class="legend-row">
          <span class="legend-color" style="background:#06c755;"></span>
          閲覧済: ${viewedCount} 人
        </div>
        <div class="legend-row">
          <span class="legend-color" style="background:#cccccc;"></span>
          未閲覧: ${notViewedCount} 人
        </div>
      `;

      wrapper.appendChild(title);
      wrapper.appendChild(canvas);
      wrapper.appendChild(chartText);
      wrapper.appendChild(legend);
      chartContainerEl.appendChild(wrapper);

      drawChart(canvas, viewedCount, notViewedCount);
    }

    function drawChart(canvas, viewed, notViewed) {
      const ctx = canvas.getContext("2d");
      const total = viewed + notViewed;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (total === 0) {
        ctx.beginPath();
        ctx.arc(110, 110, 80, 0, Math.PI * 2);
        ctx.fillStyle = "#cccccc";
        ctx.fill();
        return;
      }

      const startAngle = -Math.PI / 2;
      const viewedAngle = (viewed / total) * Math.PI * 2;

      // 閲覧済
      ctx.beginPath();
      ctx.moveTo(110, 110);
      ctx.arc(110, 110, 80, startAngle, startAngle + viewedAngle);
      ctx.closePath();
      ctx.fillStyle = "#06c755";
      ctx.fill();

      // 未閲覧
      ctx.beginPath();
      ctx.moveTo(110, 110);
      ctx.arc(110, 110, 80, startAngle + viewedAngle, startAngle + Math.PI * 2);
      ctx.closePath();
      ctx.fillStyle = "#cccccc";
      ctx.fill();

      // 中央穴
      ctx.beginPath();
      ctx.arc(110, 110, 45, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    document.getElementById("backBtn").addEventListener("click", () => {
      location.href = "../admin.html";
    });

    searchTextEl.addEventListener("input", renderAll);
    viewModeEl.addEventListener("change", renderAll);
    limitCountEl.addEventListener("change", renderAll);

    initLiff();
  </script>
</body>
</html>
