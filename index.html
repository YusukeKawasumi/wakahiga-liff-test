<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初回登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }
    #submitBtn {
      background: #06c755;
      color: white;
    }
    #cancelBtn {
      background: #ccc;
    }
    .info {
      padding: 10px;
      background: #e8f5e9;
      margin-bottom: 12px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>初回登録</h2>

<p><strong>userId:</strong> <span id="userId">Loading...</span></p>

<div id="existingMessage" class="info" style="display:none;"></div>

<label>姓</label>
<input type="text" id="lastName">

<label>名</label>
<input type="text" id="firstName">

<label>住所</label>
<input type="text" id="address" placeholder="例: 1-2-3">

<label>連絡先</label>
<input type="text" id="phone">

<label>
  <input type="checkbox" id="agree"> 規約に同意する
</label>

<br><br>

<button id="submitBtn">登録する</button>
<button id="cancelBtn">閉じる</button>

<hr>
<pre id="output"></pre>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmzAsVHLQAGQbHO9hZwQE49PJZOTUJgk4",
  authDomain: "wakahiga-test.firebaseapp.com",
  projectId: "wakahiga-test",
  storageBucket: "wakahiga-test.firebasestorage.app",
  messagingSenderId: "369904902476",
  appId: "1:369904902476:web:3660b07939c9fe2347afe9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUserId = "";
let isExistingUser = false;

const outputEl = document.getElementById("output");

function log(text) {
  outputEl.textContent += text + "\n";
}

async function initLiff() {
  await liff.init({ liffId: "2009602733-WpHAvc4D" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  currentUserId = profile.userId;
  document.getElementById("userId").textContent = currentUserId;

  await checkExistingUser();
}

async function checkExistingUser() {
  const ref = doc(db, "users", currentUserId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    isExistingUser = true;
    const data = snap.data();

    document.getElementById("lastName").value = data.lastName || "";
    document.getElementById("firstName").value = data.firstName || "";
    document.getElementById("address").value = data.address || "";
    document.getElementById("phone").value = data.phone || "";

    document.getElementById("existingMessage").style.display = "block";
    document.getElementById("existingMessage").textContent =
      "登録済みです。内容を変更して更新できます。";

    document.getElementById("submitBtn").textContent = "更新する";

    log("既存ユーザー読み込み");
  }
}

async function saveUser() {
  const lastName = document.getElementById("lastName").value.trim();
  const firstName = document.getElementById("firstName").value.trim();
  const address = document.getElementById("address").value.trim();
  let phone = document.getElementById("phone").value.trim();
  const agree = document.getElementById("agree").checked;

  phone = phone.replace(/[^0-9]/g, "");

  if (!lastName || !firstName || !address || !phone) {
    alert("すべて入力してください");
    return;
  }

  if (!agree) {
    alert("規約に同意してください");
    return;
  }

  if (isExistingUser) {
    const ok = confirm("登録済みです。上書き更新しますか？");
    if (!ok) return;
  }

  const data = {
    userId: currentUserId,
    lastName,
    firstName,
    address,
    phone,
    agree,
    updatedAt: new Date().toISOString(),
    createdAt: new Date().toISOString()
  };

  await setDoc(doc(db, "users", currentUserId), data, { merge: true });

  alert("保存しました");

  if (liff.isInClient()) {
    liff.closeWindow();
  } else {
    log("外部ブラウザのため閉じられません");
  }
}

function closeApp() {
  if (liff.isInClient()) {
    liff.closeWindow();
  } else {
    alert("画面を閉じてください");
  }
}

document.getElementById("submitBtn").addEventListener("click", saveUser);
document.getElementById("cancelBtn").addEventListener("click", closeApp);

initLiff();
</script>

</body>
</html>
