<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初回登録</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-top: 4px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #06c755;
      color: white;
      font-size: 16px;
    }
    pre {
      background: #f4f4f4;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success {
      margin-top: 16px;
      padding: 12px;
      background: #e8f5e9;
      border: 1px solid #06c755;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h2>初回登録</h2>

  <p><strong>状態:</strong> <span id="status">開始前</span></p>
  <p><strong>userId:</strong> <span id="userId">Loading...</span></p>

  <label for="lastName">姓</label>
  <input type="text" id="lastName" />

  <label for="firstName">名</label>
  <input type="text" id="firstName" />

  <label for="address">住所</label>
  <input type="text" id="address" placeholder="例: 1-2-3 / 1-2-3-456" />

  <label for="phone">連絡先</label>
  <input type="text" id="phone" />

  <label>
    <input type="checkbox" id="agree" />
    規約に同意する
  </label>

  <br><br>

  <button id="submitBtn">登録</button>

  <div id="successMessage" class="success" style="display:none;"></div>

  <hr>

  <h3>デバッグ / 保存結果</h3>
  <pre id="output"></pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCmzAsVHLQAGQbHO9hZwQE49PJZOTUJgk4",
      authDomain: "wakahiga-test.firebaseapp.com",
      projectId: "wakahiga-test",
      storageBucket: "wakahiga-test.firebasestorage.app",
      messagingSenderId: "369904902476",
      appId: "1:369904902476:web:3660b07939c9fe2347afe9"
    };

    const statusEl = document.getElementById("status");
    const userIdEl = document.getElementById("userId");
    const outputEl = document.getElementById("output");
    const successEl = document.getElementById("successMessage");
    const submitBtn = document.getElementById("submitBtn");

    function setStatus(text) {
      statusEl.textContent = text;
      outputEl.textContent += `[STATUS] ${text}\n`;
    }

    function showSuccessMessage(text) {
      successEl.textContent = text;
      successEl.style.display = "block";
    }

    let currentUserId = "";
    let db = null;

    try {
      setStatus("Firebase初期化開始");
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      setStatus("Firebase初期化完了");
    } catch (e) {
      setStatus("Firebase初期化失敗");
      outputEl.textContent += `[FIREBASE INIT ERROR] ${e.message || e}\n`;
    }

    async function initLiff() {
      try {
        setStatus("LIFF初期化開始");
        await liff.init({ liffId: "2009602733-WpHAvc4D" });
        setStatus("LIFF初期化完了");

        outputEl.textContent += `[isInClient] ${liff.isInClient()}\n`;

        if (!liff.isLoggedIn()) {
          setStatus("未ログインのためloginへ");
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentUserId = profile.userId;
        userIdEl.textContent = currentUserId;
        setStatus("userId取得完了");
      } catch (e) {
        userIdEl.textContent = "エラー";
        setStatus("LIFFエラー");
        outputEl.textContent += `[LIFF ERROR] ${e.message || e}\n`;
      }
    }

    async function saveUser() {
      try {
        setStatus("登録処理開始");

        const lastName = document.getElementById("lastName").value.trim();
        const firstName = document.getElementById("firstName").value.trim();
        const address = document.getElementById("address").value.trim();
        let phone = document.getElementById("phone").value.trim();
        const agree = document.getElementById("agree").checked;

        phone = phone.replace(/[^0-9]/g, "");

        if (!currentUserId) {
          throw new Error("userId が取得できていません");
        }
        if (!lastName || !firstName || !address || !phone) {
          throw new Error("すべて入力してください");
        }
        if (!agree) {
          throw new Error("規約に同意してください");
        }
        if (!db) {
          throw new Error("Firestore が初期化されていません");
        }

        const data = {
          userId: currentUserId,
          lastName,
          firstName,
          address,
          phone,
          agree,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };

        outputEl.textContent += `[SAVE DATA]\n${JSON.stringify(data, null, 2)}\n`;

        await setDoc(doc(db, "users", currentUserId), data, { merge: true });

        setStatus("Firestore保存完了");
        outputEl.textContent += `[SUCCESS] Firestore に保存しました\n`;

        submitBtn.disabled = true;
        submitBtn.textContent = "登録完了";

        if (liff.isInClient()) {
          setStatus("LINEクライアント内のため画面を閉じます");
          showSuccessMessage("登録完了しました。画面を閉じます。");

          setTimeout(() => {
            try {
              liff.closeWindow();
            } catch (e) {
              outputEl.textContent += `[CLOSE ERROR] ${e.message || e}\n`;
              showSuccessMessage("登録完了しました。画面を閉じてください。");
            }
          }, 800);
        } else {
          setStatus("外部ブラウザのため画面を閉じられません");
          showSuccessMessage("登録完了しました。画面を閉じてください。");
        }

      } catch (e) {
        setStatus("保存エラー");
        outputEl.textContent += `[SAVE ERROR] ${e.message || e}\n`;
        alert(e.message || e);
      }
    }

    submitBtn.addEventListener("click", saveUser);

    initLiff();
  </script>
</body>
</html>
