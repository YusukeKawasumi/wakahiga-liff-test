<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>回覧板</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }
    .primary {
      background: #06c755;
      color: white;
    }
    .warning {
      background: #ffcc00;
    }
    .box {
      padding: 12px;
      background: #f4f4f4;
      margin-top: 12px;
    }
  </style>
</head>
<body>

<h2>回覧板</h2>

<p><strong>userId:</strong> <span id="userId">Loading...</span></p>

<div id="message" class="box"></div>

<button id="viewBtn" class="primary" style="display:none;">
  回覧物を閲覧する
</button>

<button id="registerBtn" class="warning" style="display:none;">
  登録ページへ
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "wakahiga-test.firebaseapp.com",
  projectId: "wakahiga-test",
  storageBucket: "wakahiga-test.firebasestorage.app",
  messagingSenderId: "369904902476",
  appId: "1:3699..."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUserId = "";
let userData = null;

const msg = document.getElementById("message");

async function init() {
  await liff.init({ liffId: "2009602733-WpHAvc4D" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  currentUserId = profile.userId;

  document.getElementById("userId").textContent = currentUserId;

  await checkUser();
}

async function checkUser() {
  const ref = doc(db, "users", currentUserId);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    msg.textContent = "未登録です。登録してください。";

    document.getElementById("registerBtn").style.display = "block";
    return;
  }

  userData = snap.data();

  msg.textContent = `ようこそ ${userData.lastName} ${userData.firstName} さん`;

  document.getElementById("viewBtn").style.display = "block";
}

async function viewDocument() {
  // 🔥 閲覧履歴を保存
  await addDoc(collection(db, "viewLogs"), {
    userId: currentUserId,
    lastName: userData.lastName,
    firstName: userData.firstName,
    documentName: "回覧物テスト",
    viewedAt: new Date().toISOString()
  });

  alert("閲覧履歴を記録しました");

  // 👉 将来ここでPDF表示
}

document.getElementById("viewBtn").addEventListener("click", viewDocument);

document.getElementById("registerBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});

init();
</script>

</body>
</html>
