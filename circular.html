<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmzAsVHLQAGQbHO9hZwQE49PJZOTUJgk4",
  authDomain: "wakahiga-test.firebaseapp.com",
  projectId: "wakahiga-test",
  storageBucket: "wakahiga-test.firebasestorage.app",
  messagingSenderId: "369904902476",
  appId: "1:369904902476:web:3660b07939c9fe2347afe9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUserId = "";

async function init() {
  await liff.init({ liffId: "2009623625-55OO77NK" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  currentUserId = profile.userId;

  await checkUserAndShow();
}

async function checkUserAndShow() {
  const ref = doc(db, "users", currentUserId);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.body.innerHTML = `
      <h2>未登録です</h2>
      <p>先に登録してください</p>
      <button onclick="location.href='index.html'">登録ページへ</button>
    `;
    return;
  }

  const userData = snap.data();

  // 🔥 閲覧履歴を自動記録
  await addDoc(collection(db, "viewLogs"), {
    userId: currentUserId,
    lastName: userData.lastName,
    firstName: userData.firstName,
    documentName: "回覧物1",
    viewedAt: new Date().toISOString()
  });

  // 🔥 PDF表示
  document.body.innerHTML = `
    <iframe 
      src="https://yusukekawasumi.github.io/wakahiga-liff-test/sample.pdf" 
      width="100%" 
      height="100%" 
      style="border:none;">
    </iframe>
  `;
}

init();
</script>
